# EAS Build — builds Android APK when you push a git tag like v1.0.0
#
# EAS (Expo Application Services) free tier: 30 builds/month
# The APK can be installed directly on Android devices (sideload)
# No Play Store submission needed for testing
#
# Setup:
#   1. Install EAS CLI: npm install -g eas-cli
#   2. Login: eas login
#   3. Configure: eas build:configure (run in frontend/)
#   4. Add EXPO_TOKEN secret to GitHub (get from expo.dev/accounts/tokens)

name: Build Mobile

on:
  push:
    tags: ['v*']  # runs on tags like v1.0.0, v1.1.0

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          EXPO_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          EXPO_PUBLIC_COGNITO_REGION: ${{ secrets.AWS_REGION }}
