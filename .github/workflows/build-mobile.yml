# EAS Build — triggers on git tags like v1.0.0
# Builds an Android APK via EAS cloud (free tier: 30 builds/month)
# then uploads it as a GitHub Release asset.
#
# Required GitHub secrets:
#   EXPO_TOKEN              — from expo.dev/accounts/[you]/settings/access-tokens
#   API_URL                 — CDK output: API Gateway URL
#   COGNITO_USER_POOL_ID    — CDK output
#   COGNITO_CLIENT_ID       — CDK output
#   APP_REGION              — e.g. us-east-1  (not AWS_REGION — that name is reserved by GitHub Actions)
#
# To release: git tag v1.2.3 && git push --tags

name: Build & Release Android APK

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        id: build
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json)
          echo "apk_url=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')" >> "$GITHUB_OUTPUT"
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          EXPO_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          EXPO_PUBLIC_REGION: ${{ secrets.APP_REGION }}

      - name: Download APK
        working-directory: ${{ runner.temp }}
        run: |
          curl -L -o "psx-tracker-${{ github.ref_name }}.apk" "${{ steps.build.outputs.apk_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PSX Tracker ${{ github.ref_name }}
          body: |
            ## PSX Tracker ${{ github.ref_name }}

            **Android APK** — download and install directly on your device.

            > **Install:** enable *Install from unknown sources* in Android Settings → Apps, then open the APK.
          generate_release_notes: true
          files: ${{ runner.temp }}/psx-tracker-${{ github.ref_name }}.apk
